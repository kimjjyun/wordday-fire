        <h1>WordDay — 매일 아침 10분, 영어 단어 하나씩</h1>
        <p>
          WordDay는 매일 짧은 시간 투자로 영어 단어를 꾸준히 쌓아가는 무료 학습 서비스입니다.
          감정·성격, 사회·문화, 자연·환경, 학문·사고, 경제·일상, 건강·신체, 기술·과학, 행동·동작,
          문화·예술 등 9개 분야에 걸쳐 1,200여 개의 필수 영어 단어를 한국어 뜻과 실제 예문과 함께 제공합니다.
        </p>

        <h2>주요 기능</h2>
        <ul>
          <li><strong>단어 암기</strong> — 분야별·일자별로 단어 카드를 넘기며 영어 단어와 뜻, 예문을 학습합니다.</li>
          <li><strong>퀴즈 풀기</strong> — 학습한 단어를 객관식 퀴즈로 즉시 점검하고 약한 부분을 보완합니다.</li>
          <li><strong>90일 학습 과정</strong> — 하루 20단어씩 90일 동안 꾸준히 어휘력을 늘릴 수 있도록 구성했습니다.</li>
          <li><strong>로그인 없이 시작</strong> — 가입 없이도 추천 단어로 바로 학습을 시작할 수 있습니다.</li>
          <li><strong>교실 모드</strong> — 선생님이 학급을 만들고 학생들과 함께 실시간 단어 시험을 진행할 수 있습니다.</li>
        </ul>

        <h2>이런 분께 추천합니다</h2>
        <p>
          수능·내신 영어를 준비하는 학생, 기초 어휘력을 다지고 싶은 영어 학습자, 그리고 학급 단위로
          단어 시험을 운영하려는 선생님 모두에게 적합합니다. 매일 10분, 작은 습관이 큰 어휘력을 만듭니다.
        </p>

        <h2>예시 단어</h2>
        <ul>
          <li><strong>ambitious</strong> — 야망 있는 · <em>She is ambitious and always strives for more.</em></li>
          <li><strong>compassionate</strong> — 동정심이 많은 · <em>He is compassionate toward those in need.</em></li>
          <li><strong>curious</strong> — 호기심이 많은 · <em>Children are naturally curious about the world.</em></li>
          <li><strong>grateful</strong> — 감사하는 · <em>I am grateful for your help.</em></li>
        </ul>
